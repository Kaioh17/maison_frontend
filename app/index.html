<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maison" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Maison</title>
    <script>
      (function () {
        try {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', applyTheme)
          } else {
            applyTheme()
          }
          function applyTheme() {
            const savedTheme = localStorage.getItem('theme')
            const root = document.documentElement
            const body = document.body
            if (savedTheme === 'light') {
              root.setAttribute('data-theme', 'light')
              body.setAttribute('data-theme', 'light')
            } else if (savedTheme === 'dark') {
              root.setAttribute('data-theme', 'dark')
              body.setAttribute('data-theme', 'dark')
            } else if (savedTheme === 'auto') {
              root.setAttribute('data-theme', 'auto')
              body.setAttribute('data-theme', 'auto')
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                root.setAttribute('data-theme', 'dark')
                body.setAttribute('data-theme', 'dark')
              } else {
                root.setAttribute('data-theme', 'light')
                body.setAttribute('data-theme', 'light')
              }
            } else {
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                root.setAttribute('data-theme', 'dark')
                body.setAttribute('data-theme', 'dark')
              } else {
                root.setAttribute('data-theme', 'light')
                body.setAttribute('data-theme', 'light')
              }
            }
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.body.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
