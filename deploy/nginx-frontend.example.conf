# Snippet for serving the Vite production build (`dist/`) behind Nginx + Cloudflare Tunnel.
# Merge into your server block or include from http {}.

gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

# If your Nginx build includes ngx_brotli:
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

location ~* \.(js|css|webp|png|jpg|jpeg|avif|svg|woff2)$ {
  expires 1y;
  add_header Cache-Control "public, immutable";
}
